<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>郭桂滨 & 龙紫君 婚礼邀请函</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="music-btn" id="musicBtn">
    <svg class="music-icon playing" id="musicPlaying" viewBox="0 0 24 24" fill="white">
      <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
    </svg>
    <svg class="music-icon paused" id="musicPaused" viewBox="0 0 24 24" fill="white">
      <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
      <line x1="4" y1="4" x2="20" y2="20" stroke="white" stroke-width="2"/>
    </svg>
  </div>

  <audio id="bgMusic" loop>
    <source src="music/love.m4a" type="audio/mp4">
  </audio>

  <section class="section cover" id="cover">
    <div class="cover-content">
      <div class="decoration top-left"></div>
      <div class="decoration top-right"></div>
      <p class="subtitle">We're Getting Married</p>
      <h1 class="main-title">我们结婚啦</h1>
      <div class="names">
        <span class="name">郭桂滨</span>
        <span class="heart">&</span>
        <span class="name">龙紫君</span>
      </div>
      <p class="date">2026.08.03</p>
      <p class="lunar-date">农历六月廿一</p>
      <div class="scroll-hint">
        <span>向上滑动</span>
        <div class="arrow"></div>
      </div>
    </div>
  </section>

  <section class="section couple" id="couple">
    <div class="section-content">
      <h2 class="section-title">新人介绍</h2>
      <div class="couple-photos">
        <div class="photo-card">
          <div class="photo-placeholder groom">
            <span>新郎照片</span>
          </div>
          <p class="photo-name">郭桂滨</p>
        </div>
        <div class="photo-card">
          <div class="photo-placeholder bride">
            <span>新娘照片</span>
          </div>
          <p class="photo-name">龙紫君</p>
        </div>
      </div>
      <p class="couple-quote">愿得一人心，白首不相离</p>
    </div>
  </section>

  <section class="section wedding-info" id="info">
    <div class="section-content">
      <h2 class="section-title">婚礼信息</h2>
      <div class="info-cards">
        <div class="info-card">
          <div class="info-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </div>
          <p class="info-label">日期</p>
          <p class="info-value">2026年8月3日</p>
          <p class="info-sub">星期一 · 农历六月廿一</p>
        </div>
        <div class="info-card">
          <div class="info-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <p class="info-label">时间</p>
          <p class="info-value">17:30</p>
          <p class="info-sub">恭候光临</p>
        </div>
        <div class="info-card">
          <div class="info-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
          </div>
          <p class="info-label">地点</p>
          <p class="info-value">广东汕头</p>
          <p class="info-sub">潮阳区贵屿镇</p>
        </div>
      </div>
    </div>
  </section>

  <section class="section gallery" id="gallery">
    <div class="section-content">
      <h2 class="section-title">甜蜜瞬间</h2>
      <div class="gallery-grid">
        <div class="gallery-item">
          <div class="photo-placeholder gallery-photo">
            <span>照片 1</span>
          </div>
        </div>
        <div class="gallery-item">
          <div class="photo-placeholder gallery-photo">
            <span>照片 2</span>
          </div>
        </div>
        <div class="gallery-item">
          <div class="photo-placeholder gallery-photo">
            <span>照片 3</span>
          </div>
        </div>
        <div class="gallery-item">
          <div class="photo-placeholder gallery-photo">
            <span>照片 4</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="section wishes" id="wishes">
    <div class="section-content">
      <h2 class="section-title">送上祝福</h2>
      <div class="wish-form">
        <input type="text" id="wishName" placeholder="您的名字" class="wish-input">
        <textarea id="wishText" placeholder="写下您的祝福..." class="wish-textarea"></textarea>
        <button id="wishBtn" class="wish-btn">送出祝福</button>
      </div>
      <div class="wish-list" id="wishList"></div>
    </div>
  </section>

  <footer class="footer">
    <p>感谢您的祝福与见证</p>
    <p class="footer-names">郭桂滨 & 龙紫君</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
